<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle shadow -->
  <circle cx="50" cy="50" r="48" fill="#1a1a1a" opacity="0.3"/>

  <!-- Main coin body -->
  <circle cx="50" cy="50" r="45" fill="#d4af37"/>

  <!-- Coin shine/highlight -->
  <circle cx="50" cy="50" r="45" fill="url(#coinGradient)"/>

  <!-- Inner border -->
  <circle cx="50" cy="50" r="45" stroke="#8b7520" stroke-width="2" fill="none"/>

  <!-- Text shadow -->
  <text x="50" y="62" font-size="48" font-weight="900" text-anchor="middle" fill="#000000" opacity="0.3" font-family="Arial, sans-serif" letter-spacing="2">+1</text>

  <!-- Text: +1 with outline -->
  <text x="50" y="60" font-size="48" font-weight="900" text-anchor="middle" fill="#ffffff" stroke="#2c2416" stroke-width="1.5" font-family="Arial, sans-serif" letter-spacing="2">+1</text>

  <!-- Gradient definition for shine effect -->
  <defs>
    <radialGradient id="coinGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#f0d850;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>
