<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Intentions Loot Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #5b8dee;
      --accent-dim: #3d60b0;
      --danger: #e05b5b;
      --danger-dim: #b03d3d;
      --success-bg: #1a2d22;
      --success-border: #2e6b4a;
      --success-text: #4caf7d;
      --warn-bg: #2d2a1a;
      --warn-border: #6b5a2e;
      --warn-text: #f0c060;
      --text: #e0e4f0;
      --text-dim: #7a80a0;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    /* ── DB BAR ── */
    .db-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      gap: 0.75rem;
    }

    .db-count { color: var(--text-dim); }

    /* ── INPUT ── */
    .input-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .input-section label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
    }

    textarea {
      width: 100%;
      height: 140px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.82rem;
      padding: 0.75rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--accent); }

    /* ── NOTIFICATIONS ── */
    .notify {
      border-radius: 6px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      display: none;
    }

    .notify.success {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      color: var(--success-text);
    }

    .notify.warning {
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      color: var(--warn-text);
    }

    .error-msg {
      background: #2d1a1a;
      border: 1px solid #6b2e2e;
      color: #f08080;
      border-radius: 6px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      display: none;
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    button {
      padding: 0.55rem 1.2rem;
      border-radius: 6px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
      font-family: inherit;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dim); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--border); }

    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-dim); }

    .stats { font-size: 0.82rem; color: var(--text-dim); }

    .view-toggle { margin-left: auto; }

    .view-select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    .view-select:focus { border-color: var(--accent); }

    /* ── TABLE ── */
    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead { background: var(--surface2); }

    th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--text-dim);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      word-break: break-word;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    /* ── CARDS ── */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.6rem 1.25rem;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: var(--accent); }

    .card-field { display: flex; flex-direction: column; gap: 0.15rem; }

    .field-key {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-value {
      font-size: 0.88rem;
      color: var(--text);
      word-break: break-word;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    /* ── CARD TABS ── */
    .card-tabs-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
      gap: 1rem;
    }

    .card-tabs {
      display: flex;
      gap: 0.5rem;
    }

    .tab-btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-bottom: 3px solid transparent;
      background: transparent;
      color: var(--text-dim);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -2px;
    }

    .tab-btn:hover {
      color: var(--text);
      border-bottom-color: var(--accent-dim);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .boss-filter {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    .boss-filter:focus {
      border-color: var(--accent);
    }

    .boss-filter:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .filter-dropdowns {
      display: flex;
      gap: 0.75rem;
    }

    #output { min-height: 80px; }
  </style>
  <script>const whTooltips = {colorLinks: true, iconizeLinks: true, renameLinks: true};</script>
  <script src="https://wow.zamimg.com/js/tooltips.js"></script>
</head>
<body>

  <h1>Dark Intentions Loot Viewer</h1>
  <p class="subtitle">Paste TSV data to add it to the local database. Duplicate rows are automatically skipped.</p>

  <div class="db-bar">
    <span class="db-count" id="db-count">Loading…</span>
    <button class="btn-danger" onclick="confirmClearDB()">Clear Database</button>
  </div>

  <div class="input-section">
    <label for="tsv-input">Paste TSV data</label>
    <textarea id="tsv-input" placeholder="Column A&#9;Column B&#9;Column C&#10;Value 1&#9;Value 2&#9;Value 3&#10;Value 4&#9;Value 5&#9;Value 6"></textarea>
  </div>

  <div id="notify" class="notify"></div>
  <div id="error" class="error-msg"></div>

  <div class="controls">
    <button class="btn-primary" onclick="processInput()">Add to Database</button>
    <button class="btn-ghost" onclick="clearInput()">Clear Input</button>
    <span class="stats" id="stats"></span>
    <div class="view-toggle" id="view-toggle" style="display:none;">
      <select class="view-select" id="view-select" onchange="setView(this.value)">
        <option value="cards">Cards</option>
        <option value="table">Table</option>
      </select>
    </div>
  </div>

  <div id="card-tabs" class="card-tabs-container" style="display:none; margin-bottom: 1rem;">
    <div class="card-tabs">
      <button class="tab-btn active" data-tab="gear" onclick="setCardTab('gear')">Gear</button>
      <button class="tab-btn" data-tab="untradeable" onclick="setCardTab('untradeable')">Untradeable PL</button>
      <button class="tab-btn" data-tab="professions" onclick="setCardTab('professions')">Professions</button>
    </div>
    <div class="filter-dropdowns">
      <select id="response-filter" class="boss-filter" onchange="setResponseFilter(this.value)">
        <option value="">All Responses</option>
      </select>
      <select id="boss-filter" class="boss-filter" onchange="setBossFilter(this.value)">
        <option value="">All Bosses</option>
      </select>
    </div>
  </div>

  <div id="output"></div>

  <script>
    // ── IndexedDB ────────────────────────────────────────────────────────────
    const DB_NAME = 'TSVViewerDB';
    const DB_VERSION = 1;
    let db;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains('rows')) {
            d.createObjectStore('rows', { keyPath: 'key' });
          }
        };
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      });
    }

    // Use player, date, itemID, and response as unique key for deduplication
    function rowKey(dataObj) {
      try {
        const key = {
          player: dataObj.player || '',
          date: dataObj.date || '',
          itemID: dataObj.itemID || '',
          response: dataObj.response || ''
        };
        return JSON.stringify(key);
      } catch (err) {
        console.error('[rowKey] Error creating key:', err, 'Data:', dataObj);
        throw err;
      }
    }

    function addRowsToDB(dataObjects) {
      return new Promise((resolve, reject) => {
        let added = 0, skipped = 0;
        const tx = db.transaction('rows', 'readwrite');
        const store = tx.objectStore('rows');

        dataObjects.forEach((data, i) => {
          try {
            const key = rowKey(data);
            const req = store.add({ key, data, insertedAt: Date.now() + i });
            req.onsuccess = () => added++;
            req.onerror = (e) => {
              if (e.target.error?.name === 'ConstraintError') {
                skipped++;
              }
              e.preventDefault(); // prevent transaction abort
            };
          } catch (err) {
            console.error('[addRowsToDB] Error creating key for row', i, ':', err);
          }
        });

        tx.oncomplete = () => resolve({ added, skipped });
        tx.onerror = () => resolve({ added, skipped }); // Still resolve with partial results
        tx.onabort = () => resolve({ added, skipped }); // Still resolve with partial results
      });
    }

    function getAllRows() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('rows', 'readonly');
        const req = tx.objectStore('rows').getAll();
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      });
    }

    function clearAllRows() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('rows', 'readwrite');
        tx.objectStore('rows').clear();
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    // ── Hidden columns (stored in DB but not displayed) ──────────────────────
    const HIDDEN_COLS = new Set(['itemString', 'owner', 'votes', 'itemid', 'itemID', 'responseID', 'roletype', 'isAwardReason', 'rollType']);

    // ── UI Helpers ───────────────────────────────────────────────────────────
    let currentView = 'cards';
    let currentCardTab = 'gear';
    let currentBossFilter = '';
    let currentResponseFilter = '';

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error').style.display = 'none';
    }

    function showNotify(msg, type = 'success') {
      const el = document.getElementById('notify');
      el.textContent = msg;
      el.className = 'notify ' + type;
      el.style.display = 'block';
      clearTimeout(el._timer);
      el._timer = setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function updateDBCount(n) {
      document.getElementById('db-count').textContent =
        `${n} row${n !== 1 ? 's' : ''} in database`;
    }

    // ── Process Input ────────────────────────────────────────────────────────
    async function processInput() {
      hideError();
      const raw = document.getElementById('tsv-input').value.trim();

      if (!raw) {
        showError('Nothing to process — paste some TSV data first.');
        return;
      }

      const lines = raw.split('\n').map(l => l.trimEnd()).filter(l => l.length > 0);

      if (lines.length < 2) {
        showError('Need at least a header row and one data row.');
        return;
      }

      let headers = lines[0].split('\t').map(h => {
        const trimmed = h.trim();
        const lower = trimmed.toLowerCase();
        // Rename columns
        if (lower === 'subtype') return 'Armor Type';
        if (lower === 'equiploc') return 'Gear Slot';
        return trimmed;
      });

      // Map of SUBTYPE values to Armor Type display names
      const armorTypeMap = {
        'Cloth': 'Cloth',
        'Leather': 'Leather',
        'Mail': 'Mail',
        'Plate': 'Plate',
        'Miscellaneous': 'Accessory',
        'Armor Token': 'Tier Token',
        'Bows': 'Bow',
        'Crossbows': 'Crossbow',
        'Guns': 'Gun',
        'One-Handed Axes': '1H Axe',
        'Two-Handed Axes': '2H Axe',
        'One-Handed Maces': '1H Mace',
        'Two-Handed Maces': '2H Mace',
        'One-Handed Swords': '1H Sword',
        'Two-Handed Swords': '2H Sword',
        'Daggers': 'Dagger',
        'Fist Weapons': 'Fist Weapon',
        'Polearms': 'Polearm',
        'Staves': 'Staff',
        'Wands': 'Wand',
        'Shields': 'Shield',
        'Held In Off-hand': 'Off-hand',
        'Other': 'Other'
      };

      // Map of equipLoc values to Gear Slot display names
      const gearSlotMap = {
        'Head': 'Head',
        'Neck': 'Neck',
        'Shoulder': 'Shoulder',
        'Chest': 'Chest',
        'Waist': 'Waist',
        'Legs': 'Legs',
        'Feet': 'Feet',
        'Wrist': 'Wrist',
        'Hands': 'Hands',
        'Finger': 'Ring',
        'Trinket': 'Trinket',
        'Back': 'Cloak',
        'Main Hand': 'Main Hand',
        'Off Hand': 'Off Hand',
        'Ranged': 'Ranged',
        'Two Hand': '2-Hand',
        'Held In Off-hand': 'Off-hand',
        'Blacksmithing': 'Crafting',
        'Jewelcrafting': 'Crafting',
        'Bows': 'Bow',
        'Crossbows': 'Crossbow',
        'Guns': 'Gun'
      };

      const dataObjects = lines
        .slice(1)
        .map(l => l.split('\t'))
        .filter(vals => vals.some(v => v.trim() !== ''))
        .map(vals => {
          const obj = {};
          headers.forEach((h, i) => {
            const key = h.trim() || `Col${i + 1}`;
            let val = vals[i] ?? '';
            // Extract URL from Excel HYPERLINK formula: =HYPERLINK("URL";"Display Text")
            if (val.startsWith('=HYPERLINK(')) {
              const urlMatch = val.match(/=HYPERLINK\("([^"]+)"/);
              if (urlMatch) val = urlMatch[1];
            }
            // Convert TIME field from 24-hour to 12-hour format
            if (key.toLowerCase() === 'time' && val.match(/^\d{1,2}:\d{2}:\d{2}$/)) {
              const [hours, mins, secs] = val.split(':').map(Number);
              const period = hours >= 12 ? 'PM' : 'AM';
              const hours12 = hours % 12 || 12;
              val = `${hours12}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')} ${period}`;
            }
            // Map Armor Type values
            if (key === 'Armor Type' && val && armorTypeMap[val]) {
              val = armorTypeMap[val];
            }
            // Map Gear Slot values
            if (key === 'Gear Slot' && val && gearSlotMap[val]) {
              val = gearSlotMap[val];
            }
            obj[key] = val;
          });
          return obj;
        });

      if (dataObjects.length === 0) {
        showError('Only a header row was found — no data rows to add.');
        return;
      }

      const { added, skipped } = await addRowsToDB(dataObjects);

      const parts = [];
      if (added > 0) parts.push(`${added} row${added !== 1 ? 's' : ''} added`);
      if (skipped > 0) parts.push(`${skipped} duplicate${skipped !== 1 ? 's' : ''} skipped`);
      const type = added === 0 ? 'warning' : 'success';
      showNotify(parts.join(' · ') || 'No changes made.', type);

      await refreshDisplay();
    }

    // ── Display ──────────────────────────────────────────────────────────────
    async function refreshDisplay() {
      try {
        const records = await getAllRows();
        records.sort((a, b) => a.insertedAt - b.insertedAt);

      updateDBCount(records.length);

      if (records.length === 0) {
        document.getElementById('output').innerHTML =
          '<div class="empty-state">No data in database yet — paste some TSV to get started.</div>';
        document.getElementById('view-toggle').style.display = 'none';
        document.getElementById('stats').textContent = '';
        return;
      }

      // Build ordered column list: union of all keys, preserving first-seen order, excluding hidden
      const colSet = new Set();
      records.forEach(r => Object.keys(r.data).forEach(k => {
        if (!HIDDEN_COLS.has(k)) colSet.add(k);
      }));
      const headers = [...colSet];
      const rows = records.map(r => r.data);

      document.getElementById('stats').textContent =
        `${rows.length} row${rows.length !== 1 ? 's' : ''}, ${headers.length} column${headers.length !== 1 ? 's' : ''}`;
      document.getElementById('view-toggle').style.display = 'flex';

      // Show/hide card tabs and filter rows based on current view and tab
      const tabsEl = document.getElementById('card-tabs');
      let filteredRows = rows;
      const professions = new Set(['Alchemy', 'Blacksmithing', 'Enchanting', 'Engineering', 'Inscription', 'Jewelcrafting', 'Leatherworking', 'Cooking']);

      if (currentView === 'cards') {
        tabsEl.style.display = 'flex';

        // Calculate unfiltered rows for each tab
        let gearRowsUnfiltered = rows.filter(row =>
          row.response !== 'Personal Loot - Non tradeable' && !professions.has(row['Armor Type'])
        );
        let untradeableRowsUnfiltered = rows.filter(row => row.response === 'Personal Loot - Non tradeable');
        let professionsRowsUnfiltered = rows.filter(row => professions.has(row['Armor Type']));

        // Populate boss and response filter dropdowns from current tab only (before applying filters)
        const tabRowsForFilters = currentCardTab === 'untradeable'
          ? untradeableRowsUnfiltered
          : currentCardTab === 'professions'
          ? professionsRowsUnfiltered
          : gearRowsUnfiltered;

        // Response filter
        const responseSet = new Set();
        tabRowsForFilters.forEach(row => {
          if (row.response) responseSet.add(row.response);
        });
        let sortedResponses = Array.from(responseSet).sort();

        // If boss filter is active, only show responses available for that boss
        if (currentBossFilter) {
          const responsesForBoss = new Set();
          tabRowsForFilters.forEach(row => {
            if (row.boss === currentBossFilter && row.response) {
              responsesForBoss.add(row.response);
            }
          });
          sortedResponses = Array.from(responsesForBoss).sort();
        }

        const responseSelect = document.getElementById('response-filter');
        const currentResponseValue = responseSelect.value;
        responseSelect.innerHTML = '<option value="">All Responses</option>';
        sortedResponses.forEach(response => {
          const option = document.createElement('option');
          option.value = response;
          option.textContent = response;
          responseSelect.appendChild(option);
        });
        responseSelect.value = currentResponseValue; // Restore previous selection if still valid
        responseSelect.disabled = sortedResponses.length === 0; // Disable if no options

        // Boss filter
        const bossSet = new Set();
        tabRowsForFilters.forEach(row => {
          if (row.boss) bossSet.add(row.boss);
        });
        let sortedBosses = Array.from(bossSet).sort();

        // If response filter is active, only show bosses available for that response
        if (currentResponseFilter) {
          const bossesForResponse = new Set();
          tabRowsForFilters.forEach(row => {
            if (row.response === currentResponseFilter && row.boss) {
              bossesForResponse.add(row.boss);
            }
          });
          sortedBosses = Array.from(bossesForResponse).sort();
        }

        const bossSelect = document.getElementById('boss-filter');
        const currentBossValue = bossSelect.value;
        bossSelect.innerHTML = '<option value="">All Bosses</option>';
        sortedBosses.forEach(boss => {
          const option = document.createElement('option');
          option.value = boss;
          option.textContent = boss;
          bossSelect.appendChild(option);
        });
        bossSelect.value = currentBossValue; // Restore previous selection if still valid
        bossSelect.disabled = sortedBosses.length === 0; // Disable if no options

        // Now apply boss and response filters to all row sets if one is selected
        let gearRows = gearRowsUnfiltered;
        let untradeableRows = untradeableRowsUnfiltered;
        let professionsRows = professionsRowsUnfiltered;

        if (currentBossFilter) {
          gearRows = gearRows.filter(row => row.boss === currentBossFilter);
          untradeableRows = untradeableRows.filter(row => row.boss === currentBossFilter);
          professionsRows = professionsRows.filter(row => row.boss === currentBossFilter);
        }

        if (currentResponseFilter) {
          gearRows = gearRows.filter(row => row.response === currentResponseFilter);
          untradeableRows = untradeableRows.filter(row => row.response === currentResponseFilter);
          professionsRows = professionsRows.filter(row => row.response === currentResponseFilter);
        }

        // Update tab button text with counts
        document.querySelector('[data-tab="gear"]').textContent = `Gear (${gearRows.length})`;
        document.querySelector('[data-tab="untradeable"]').textContent = `Untradeable PL (${untradeableRows.length})`;
        document.querySelector('[data-tab="professions"]').textContent = `Professions (${professionsRows.length})`;

        // Filter rows based on current card tab
        if (currentCardTab === 'untradeable') {
          filteredRows = untradeableRows;
        } else if (currentCardTab === 'professions') {
          filteredRows = professionsRows;
        } else {
          // 'gear' tab: exclude both untradeable and professions
          filteredRows = gearRows;
        }
      } else {
        tabsEl.style.display = 'none';
      }

      const out = document.getElementById('output');
      out.innerHTML = currentView === 'table'
        ? renderTable(headers, rows)
        : renderCards(headers, filteredRows);

      // Re-initialise Wowhead tooltips on the new content
      if (typeof $WowheadPower !== 'undefined') {
        setTimeout(() => $WowheadPower.refreshLinks(), 100);
      }
      } catch (err) {
        console.error('[refreshDisplay] Error:', err);
        showError('Error refreshing display: ' + (err?.message || err));
      }
    }

    function setView(view) {
      currentView = view;
      document.getElementById('view-select').value = view;
      refreshDisplay();
    }

    function setCardTab(tab) {
      currentCardTab = tab;
      // Update active tab styling
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-tab') === tab) {
          btn.classList.add('active');
        }
      });

      // Check if current boss/response filters have any results in the new tab
      // If not, reset the filters
      if (currentBossFilter || currentResponseFilter) {
        // Get all rows and filter by tab type
        openDB().then(d => {
          db = d;
          getAllRows().then(records => {
            const rows = records.map(r => r.data);
            const professions = new Set(['Alchemy', 'Blacksmithing', 'Enchanting', 'Engineering', 'Inscription', 'Jewelcrafting', 'Leatherworking', 'Cooking']);

            let tabRows;
            if (tab === 'untradeable') {
              tabRows = rows.filter(row => row.response === 'Personal Loot - Non tradeable');
            } else if (tab === 'professions') {
              tabRows = rows.filter(row => professions.has(row['Armor Type']));
            } else {
              tabRows = rows.filter(row =>
                row.response !== 'Personal Loot - Non tradeable' && !professions.has(row['Armor Type'])
              );
            }

            // Check if any rows match the current boss filter
            if (currentBossFilter) {
              const hasBossResults = tabRows.some(row => row.boss === currentBossFilter);
              if (!hasBossResults) {
                currentBossFilter = ''; // Reset filter if no results
                document.getElementById('boss-filter').value = '';
              }
            }

            // Check if any rows match the current response filter
            if (currentResponseFilter) {
              const hasResponseResults = tabRows.some(row => row.response === currentResponseFilter);
              if (!hasResponseResults) {
                currentResponseFilter = ''; // Reset filter if no results
                document.getElementById('response-filter').value = '';
              }
            }

            refreshDisplay();
          });
        });
      } else {
        refreshDisplay();
      }
    }

    function setBossFilter(boss) {
      currentBossFilter = boss;
      refreshDisplay();
    }

    function setResponseFilter(response) {
      currentResponseFilter = response;
      refreshDisplay();
    }

    function cellContent(val) {
      if (!val) return '<span style="opacity:0.4">—</span>';
      // If it's a Wowhead URL, convert to a link for tooltip processing
      if (val.includes('wowhead.com')) {
        return `<a href="${esc(val)}" data-wh-icon="true"></a>`;
      }
      return esc(val);
    }

    function renderTable(headers, rows) {
      const ths = headers.map(h => `<th>${esc(h)}</th>`).join('');
      const trs = rows.map(row => {
        const tds = headers.map(h => `<td>${cellContent(row[h] ?? '')}</td>`).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
      return `<div class="table-wrapper"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
    }

    function renderCards(headers, rows) {
      const cards = rows.map(row => {
        const fields = headers.map(h => `
          <div class="card-field">
            <span class="field-key">${esc(h)}</span>
            <span class="field-value">${cellContent(row[h] ?? '')}</span>
          </div>`).join('');
        return `<div class="card">${fields}</div>`;
      }).join('');
      return `<div class="card-list">${cards}</div>`;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Actions ──────────────────────────────────────────────────────────────
    function clearInput() {
      document.getElementById('tsv-input').value = '';
      hideError();
    }

    function confirmClearDB() {
      if (confirm('Delete all rows from the database? This cannot be undone.')) {
        clearAllRows().then(refreshDisplay);
      }
    }

    // Auto-process on paste (with delay to ensure text is inserted)
    document.getElementById('tsv-input').addEventListener('paste', () => {
      setTimeout(processInput, 200);
    });

    // ── One-time migration: clean ITEM field on existing rows ─────────────────
    async function migrateItemField() {
      if (localStorage.getItem('tsv_item_cleanup_v1')) return;

      const records = await getAllRows();
      const toFix = records.filter(r => {
        const key = Object.keys(r.data).find(k => k.toLowerCase() === 'item');
        return key && r.data[key].includes('"');
      });

      if (toFix.length > 0) {
        await new Promise((resolve, reject) => {
          const tx = db.transaction('rows', 'readwrite');
          const store = tx.objectStore('rows');

          toFix.forEach(record => {
            const itemKey = Object.keys(record.data).find(k => k.toLowerCase() === 'item');
            const val = record.data[itemKey];
            const first = val.indexOf('"');
            const second = val.indexOf('"', first + 1);
            if (first !== -1 && second !== -1) {
              const newData = { ...record.data, [itemKey]: val.substring(first + 1, second) };
              store.delete(record.key);
              store.add({ key: rowKey(newData), data: newData, insertedAt: record.insertedAt });
            }
          });

          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
      }

      localStorage.setItem('tsv_item_cleanup_v1', '1');
    }

    // ── One-time migration: clean GEAR1/GEAR2 fields on existing rows ─────────
    async function migrateGearFields() {
      if (localStorage.getItem('tsv_gear_cleanup_v3')) return;

      const records = await getAllRows();
      // Re-process any row that has a GEAR1/GEAR2 field — catches both raw and
      // previously mis-processed rows (wrong ID extracted by old regex)
      const toFix = records.filter(r =>
        ['gear1', 'gear2'].some(g =>
          Object.keys(r.data).some(k => k.toLowerCase() === g)
        )
      );

      if (toFix.length > 0) {
        await new Promise((resolve, reject) => {
          const tx = db.transaction('rows', 'readwrite');
          const store = tx.objectStore('rows');

          toFix.forEach(record => {
            const newData = { ...record.data };
            ['gear1', 'gear2'].forEach(g => {
              const k = Object.keys(newData).find(k => k.toLowerCase() === g);
              if (!k) return;
              const raw = newData[k];
              if (raw.includes('"')) {
                // Raw value still has quotes — extract ID and name
                newData[`_${g}_id`] = extractItemId(raw);
                newData[k] = extractBetweenQuotes(raw);
              } else {
                // Already cleaned — re-run ID extraction on original stored value
                // (ID may have been wrong from old regex; try again on current value)
                newData[`_${g}_id`] = extractItemId(raw + '"');
              }
            });
            store.delete(record.key);
            store.add({ key: rowKey(newData), data: newData, insertedAt: record.insertedAt });
          });

          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
      }

      localStorage.setItem('tsv_gear_cleanup_v3', '1');
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    window.addEventListener('load', () => {
      console.log('[Init] Page loaded, checking Wowhead...');
      if (typeof $WowheadPower === 'undefined') {
        console.warn('[Init] Wowhead script not loaded. This may block tooltips.');
      } else {
        console.log('[Init] Wowhead script loaded successfully');
      }
    });

    openDB()
      .then(d => { db = d; return migrateItemField(); })
      .then(migrateGearFields)
      .then(refreshDisplay)
      .catch(err => showError('Failed to open database: ' + err.message));
  </script>

</body>
</html>
