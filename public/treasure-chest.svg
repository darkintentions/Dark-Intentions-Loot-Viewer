<svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Chest body - red -->
  <rect x="10" y="30" width="80" height="35" rx="3" fill="#c41e3a"/>

  <!-- Chest top/lid - gold -->
  <path d="M 10 30 Q 50 15 90 30 L 85 50 Q 50 60 15 50 Z" fill="#d4af37"/>

  <!-- Lid shine/highlight -->
  <ellipse cx="50" cy="25" rx="35" ry="12" fill="#e8c547" opacity="0.6"/>

  <!-- Chest front panel - darker red -->
  <rect x="15" y="35" width="70" height="25" rx="2" fill="#a01830"/>

  <!-- Gold trim/border -->
  <rect x="10" y="30" width="80" height="3" fill="#d4af37"/>
  <rect x="10" y="60" width="80" height="2" fill="#d4af37"/>
  <line x1="10" y1="30" x2="10" y2="65" stroke="#d4af37" stroke-width="2"/>
  <line x1="90" y1="30" x2="90" y2="65" stroke="#d4af37" stroke-width="2"/>

  <!-- Lock/keyhole - gold -->
  <circle cx="50" cy="48" r="4" fill="#d4af37"/>
  <rect x="49" y="52" width="2" height="3" fill="#d4af37"/>

  <!-- Decorative corners - gold -->
  <circle cx="13" cy="33" r="2.5" fill="#d4af37"/>
  <circle cx="87" cy="33" r="2.5" fill="#d4af37"/>
  <circle cx="13" cy="62" r="2.5" fill="#d4af37"/>
  <circle cx="87" cy="62" r="2.5" fill="#d4af37"/>

  <!-- Handle/clasp - gold -->
  <path d="M 35 28 Q 50 10 65 28" stroke="#d4af37" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>