<svg viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Left wing -->
  <path d="M 15 35 L 8 25 L 12 15 L 22 20 L 25 32 Z" fill="#d4af37"/>
  <path d="M 12 38 L 5 28 L 10 18 L 20 23 L 23 35 Z" fill="#f0d850"/>

  <!-- Right wing -->
  <path d="M 105 35 L 112 25 L 108 15 L 98 20 L 95 32 Z" fill="#d4af37"/>
  <path d="M 108 38 L 115 28 L 110 18 L 100 23 L 97 35 Z" fill="#f0d850"/>

  <!-- Main shield/chest body - red -->
  <path d="M 35 25 L 85 25 L 92 45 Q 92 65 60 72 Q 28 65 28 45 Z" fill="#c41e3a"/>
  <path d="M 35 25 L 85 25 L 92 45 Q 92 65 60 72 Q 28 65 28 45 Z" fill="#d62f47" opacity="0.5"/>

  <!-- Gold outer frame/border -->
  <path d="M 33 26 L 87 26 L 93 44 Q 93 63 60 70 Q 27 63 27 44 Z" stroke="#d4af37" stroke-width="2.5" fill="none"/>

  <!-- Gold decorative top section -->
  <rect x="35" y="20" width="50" height="8" rx="2" fill="#d4af37"/>
  <path d="M 35 25 Q 45 18 60 18 Q 75 18 85 25" fill="#f0d850"/>

  <!-- Red curved top sections -->
  <path d="M 40 30 Q 45 26 50 28 Q 55 30 60 28 Q 65 26 70 28 Q 75 30 80 30" fill="#a01830" opacity="0.7"/>

  <!-- Gold scrollwork left -->
  <path d="M 32 38 Q 28 42 32 46" stroke="#d4af37" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="30" cy="40" r="1.5" fill="#d4af37"/>
  <circle cx="30" cy="46" r="1.5" fill="#d4af37"/>

  <!-- Gold scrollwork right -->
  <path d="M 88 38 Q 92 42 88 46" stroke="#d4af37" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="90" cy="40" r="1.5" fill="#d4af37"/>
  <circle cx="90" cy="46" r="1.5" fill="#d4af47"/>

  <!-- Central gem - teal/cyan diamond -->
  <g transform="translate(60, 42)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="7" fill="#20d9d9" opacity="0.3"/>
    <!-- Diamond shape -->
    <polygon points="0,-6 5,0 0,6 -5,0" fill="#00d4ff"/>
    <polygon points="0,-6 5,0 0,6 -5,0" fill="#40f0ff" opacity="0.6"/>
    <!-- Highlight -->
    <polygon points="0,-5 3,-1 0,1 -2,-2" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Gold bottom accent bar -->
  <rect x="35" y="60" width="50" height="3" fill="#d4af37"/>
  <path d="M 35 63 Q 45 65 60 65 Q 75 65 85 63" fill="#c9a227"/>

  <!-- Lower red panel -->
  <path d="M 38 65 Q 45 68 60 68 Q 75 68 82 65 L 82 70 Q 60 72 38 70 Z" fill="#a01830"/>

  <!-- Additional gold trim details -->
  <circle cx="45" cy="27" r="1.5" fill="#f0d850"/>
  <circle cx="60" cy="24" r="1.5" fill="#f0d850"/>
  <circle cx="75" cy="27" r="1.5" fill="#f0d850"/>
</svg>